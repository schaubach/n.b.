server {
    listen 8123 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options DENY always;

    location = /health {
        proxy_pass http://mail-api:8080/health;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://mail-api:8080/;
    }

    location = /ca.crt {
        alias /etc/nginx/certs/server.crt;
        default_type application/x-x509-ca-cert;
    }

    location = /installwebapp {
        return 308 /installwebapp/;
    }

    location /installwebapp/ {
        auth_basic "n.b. WebApp Installation";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        alias /usr/share/nginx/html/installwebapp/;
        try_files $uri $uri/ /installwebapp/index.html;
    }

    location / {
        return 404;
    }
}
